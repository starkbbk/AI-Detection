<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOD MODE | AI Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --hacker-green: #00ff88;
        --hacker-dark: #020202;
      }
      body {
        margin: 0;
        background-color: var(--hacker-dark);
        color: var(--hacker-green);
        font-family: 'JetBrains Mono', monospace;
        overflow: hidden;
      }
      
      /* Static Green Glassmorphism Background */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 10% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.02) 0%, transparent 60%);
        z-index: -1;
        pointer-events: none;
      }

      .orbitron { font-family: 'Orbitron', sans-serif; }
      .courier { font-family: 'JetBrains Mono', monospace; }
      
      /* CRT Scanline Effect */
      body::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
        z-index: 9999;
        background-size: 100% 4px;
        pointer-events: none;
        opacity: 0.3;
      }
      
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--hacker-green) transparent;
      }
      *::-webkit-scrollbar { width: 4px; }
      *::-webkit-scrollbar-thumb { background: var(--hacker-green); border-radius: 10px; }
      
      .glass-hacker {
        background: rgba(0, 20, 10, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 136, 0.2);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
